<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investment Oracle</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:   #c9a84c;
      --gold2:  #e8c97a;
      --dark:   #0c0c0e;
      --panel:  #111115;
      --border: #2a2a35;
      --text:   #e8e0d0;
      --muted:  #7a7466;
      --green:  #3ecf72;
      --red:    #e05252;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Gold radial glow ── */
    body::after {
      content: '';
      position: fixed;
      top: -20vh; left: 50%;
      transform: translateX(-50%);
      width: 80vw; height: 60vh;
      background: radial-gradient(ellipse, rgba(201,168,76,.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .wrap {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1rem;
      gap: 2rem;
    }

    /* ── Header ── */
    header { text-align: center; }
    header .eyebrow {
      font-size: .65rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: .6rem;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.1;
      background: linear-gradient(135deg, var(--gold2) 0%, var(--gold) 60%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p.sub {
      margin-top: .8rem;
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .06em;
      max-width: 38ch;
      margin-inline: auto;
    }

    /* ── Card ── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 2.4rem;
      width: 100%; max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(201,168,76,.06);
    }

    /* ── Wallet row ── */
    .wallet-row {
      display: flex; align-items: center; gap: .8rem;
      margin-bottom: 1.6rem;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
      flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
    #wallet-label {
      font-size: .7rem;
      color: var(--muted);
      letter-spacing: .06em;
      flex: 1;
    }
    #connect-btn {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: .35rem .85rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    #connect-btn:hover { background: var(--gold); color: var(--dark); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 1.2rem 0;
    }

    /* ── Prompt ── */
    .prompt-label {
      font-size: .65rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .7rem;
    }
    .prompt-box {
      background: #0a0a0d;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      font-size: .8rem;
      color: var(--text);
      line-height: 1.6;
      min-height: 56px;
    }
    .prompt-box span.cursor {
      display: inline-block;
      width: 2px; height: 1em;
      background: var(--gold);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── YES Button ── */
    #yes-btn {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      width: 100%;
      margin-top: 1.4rem;
      padding: 1rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #b8922a 0%, var(--gold2) 50%, #b8922a 100%);
      background-size: 200% 200%;
      color: var(--dark);
      cursor: pointer;
      font-weight: 700;
      letter-spacing: .04em;
      transition: opacity .2s, transform .1s;
      animation: shimmer 3s ease infinite;
    }
    #yes-btn:disabled { opacity: .4; cursor: not-allowed; animation: none; }
    #yes-btn:not(:disabled):hover { transform: translateY(-1px); }
    #yes-btn:not(:disabled):active { transform: translateY(0); }
    @keyframes shimmer {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    /* ── Advice output ── */
    #advice-box {
      display: none;
      margin-top: 1.4rem;
      background: #0f0f13;
      border: 1px solid rgba(201,168,76,.25);
      border-radius: 10px;
      padding: 1.2rem 1.4rem;
      font-family: 'Playfair Display', serif;
      font-size: .95rem;
      line-height: 1.75;
      color: var(--gold2);
      position: relative;
      overflow: hidden;
    }
    #advice-box::before {
      content: '❝';
      position: absolute;
      top: -6px; left: 10px;
      font-size: 3.5rem;
      opacity: .08;
      line-height: 1;
      color: var(--gold);
    }

    /* ── Tx hash ── */
    #tx-row {
      display: none;
      margin-top: 1rem;
      font-size: .62rem;
      color: var(--muted);
      word-break: break-all;
    }
    #tx-row a { color: var(--gold); text-decoration: none; }
    #tx-row a:hover { text-decoration: underline; }

    /* ── Status bar ── */
    #status {
      font-size: .65rem;
      letter-spacing: .08em;
      color: var(--muted);
      text-align: center;
      min-height: 1.2em;
      margin-top: .5rem;
    }
    #status.ok  { color: var(--green); }
    #status.err { color: var(--red); }

    /* ── Footer ── */
    footer {
      font-size: .6rem;
      color: #3a3830;
      letter-spacing: .1em;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Base Network · On-Chain</div>
    <h1>Investment Oracle</h1>
    <p class="sub">Type YES. Receive wisdom. Every oracle fee funds the future.</p>
  </header>

  <div class="card">

    <!-- Wallet -->
    <div class="wallet-row">
      <div class="dot" id="dot"></div>
      <span id="wallet-label">Not connected</span>
      <button id="connect-btn" onclick="connectWallet()">Connect</button>
    </div>

    <div class="divider"></div>

    <!-- Input prompt -->
    <div class="prompt-label">Your command</div>
    <div class="prompt-box">
      <span id="typed-text"></span><span class="cursor"></span>
    </div>

    <button id="yes-btn" onclick="triggerAdvice()">— Yes —</button>

    <!-- Advice -->
    <div id="advice-box"></div>

    <!-- Tx -->
    <div id="tx-row"></div>

    <!-- Status -->
    <div id="status"></div>

  </div>

  <footer>Oracle v1.0 · Base Mainnet · 0.0001 ETH per query</footer>

</div>

<script>
  // ── Contract config ───────────────────────────────────────────────────────
  const CONTRACT_ADDRESS = "0x441609aCC3c7fFb6935DA1b19A55010134573D23";
  const ADVICE_FEE = "0.0001"; // ETH

  const CONTRACT_ABI = [
    {
      "inputs": [],
      "name": "requestAdvice",
      "outputs": [{"internalType":"uint256","name":"id","type":"uint256"}],
      "stateMutability": "payable",
      "type": "function"
    },
    {
      "inputs": [],
      "name": "adviceCount",
      "outputs": [{"internalType":"uint256","name":"","type":"uint256"}],
      "stateMutability": "view",
      "type": "function"
    }
  ];

  // ── Investment advice pool ────────────────────────────────────────────────
  const ADVICES = [
    "Diversify across uncorrelated assets — wealth is resilience in disguise.",
    "Buy when blood runs in the streets, even if the blood is your own.",
    "Time in the market defeats timing the market, every single decade.",
    "Your greatest investment is in systems that earn while you sleep.",
    "Inflation is a silent tax; hard assets are the silent resistance.",
    "Never invest in something you cannot explain in one sentence.",
    "Liquidity is optionality; never sacrifice tomorrow's moves for today's yield.",
    "Compound interest is the eighth wonder — let it do the heavy lifting.",
    "The best hedge against uncertainty is a portfolio of asymmetric bets.",
    "Risk is not the enemy; ignorance of risk is.",
    "Cash flow buys freedom; capital appreciation buys bragging rights.",
    "Dollar-cost averaging removes emotion — and emotion is your worst broker.",
    "Position sizing separates the disciplined investor from the gambler.",
    "The news cycle and the market cycle are not the same cycle.",
    "Own assets that benefit from human ingenuity compounding over centuries.",
  ];

  // ── State ─────────────────────────────────────────────────────────────────
  let account = null;
  let isBusy  = false;

  // ── Typing animation ──────────────────────────────────────────────────────
  const PROMPT = "Seeking oracle wisdom...";
  const FINAL  = "YES — I am ready to receive.";
  let typedEl = document.getElementById("typed-text");
  let i = 0;
  function typeChar() {
    if (i < PROMPT.length) {
      typedEl.textContent += PROMPT[i++];
      setTimeout(typeChar, 55);
    }
  }
  typeChar();

  // ── Wallet ────────────────────────────────────────────────────────────────
  async function connectWallet() {
    if (!window.ethereum) {
      setStatus("No wallet detected. Install MetaMask or Coinbase Wallet.", "err");
      return;
    }
    try {
      const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
      account = accounts[0];
      await switchToBase();
      document.getElementById("dot").classList.add("connected");
      document.getElementById("wallet-label").textContent =
        account.slice(0,6) + "…" + account.slice(-4);
      document.getElementById("connect-btn").textContent = "✓ Connected";
      document.getElementById("connect-btn").disabled = true;
      setStatus("Wallet connected. You may invoke the Oracle.", "ok");
    } catch(e) {
      setStatus("Connection rejected.", "err");
    }
  }

  async function switchToBase() {
    const BASE_CHAIN_ID = "0x2105"; // 8453
    try {
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: BASE_CHAIN_ID }]
      });
    } catch (e) {
      if (e.code === 4902) {
        await window.ethereum.request({
          method: "wallet_addEthereumChain",
          params: [{
            chainId: BASE_CHAIN_ID,
            chainName: "Base",
            rpcUrls: ["https://mainnet.base.org"],
            nativeCurrency: { name: "Ether", symbol: "ETH", decimals: 18 },
            blockExplorerUrls: ["https://basescan.org"]
          }]
        });
      }
    }
  }

  // ── Main action ───────────────────────────────────────────────────────────
  async function triggerAdvice() {
    if (isBusy) return;
    if (!account) {
      setStatus("Connect your wallet first.", "err");
      return;
    }

    isBusy = true;
    const btn = document.getElementById("yes-btn");
    btn.disabled = true;
    btn.textContent = "Consulting the Oracle…";

    setStatus("Awaiting wallet confirmation…");
    document.getElementById("advice-box").style.display = "none";
    document.getElementById("tx-row").style.display = "none";

    try {
      // ── requestAdvice() selector: keccak256("requestAdvice()")[0:4] ─────
      const data = "0xafcd7122"; // verified correct selector

      // 0.0001 ETH = 100000000000000 wei — use BigInt, never floats
      const feeHex = "0x" + BigInt("100000000000000").toString(16); // = 0x5AF3107A4000

      const txHash = await window.ethereum.request({
        method: "eth_sendTransaction",
        params: [{
          from: account,
          to: CONTRACT_ADDRESS,
          value: feeHex,
          data: data,
          gas: "0x186A0" // 100000 — enough for storage writes
        }]
      });

      setStatus("Transaction sent. Mining…");
      await waitForReceipt(txHash);

      // ── Show advice ────────────────────────────────────────────────────
      const advice = ADVICES[Math.floor(Math.random() * ADVICES.length)];
      revealAdvice(advice);

      const txRow = document.getElementById("tx-row");
      txRow.innerHTML = `TX: <a href="https://basescan.org/tx/${txHash}" target="_blank">${txHash.slice(0,10)}…${txHash.slice(-8)}</a>`;
      txRow.style.display = "block";

      setStatus("Oracle consulted. Wisdom delivered.", "ok");

      // Reset typed text
      typedEl.textContent = "";
      i = 0;
      typeWords(FINAL);

    } catch(e) {
      if (e.code === 4001) {
        setStatus("Transaction rejected by user.", "err");
      } else {
        setStatus("Error: " + (e.message || "Unknown error"), "err");
      }
    }

    btn.disabled = false;
    btn.textContent = "— Yes —";
    isBusy = false;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function revealAdvice(text) {
    const box = document.getElementById("advice-box");
    box.style.display = "block";
    box.textContent = "";
    let idx = 0;
    function next() {
      if (idx < text.length) {
        box.textContent += text[idx++];
        setTimeout(next, 28);
      }
    }
    next();
  }

  function typeWords(str) {
    let j = 0;
    function step() {
      if (j < str.length) {
        typedEl.textContent += str[j++];
        setTimeout(step, 50);
      }
    }
    step();
  }

  function setStatus(msg, cls = "") {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = cls;
  }

  async function waitForReceipt(hash) {
    for (let attempt = 0; attempt < 60; attempt++) {
      const receipt = await window.ethereum.request({
        method: "eth_getTransactionReceipt",
        params: [hash]
      });
      if (receipt) return receipt;
      await new Promise(r => setTimeout(r, 2000));
    }
    throw new Error("Transaction timeout");
  }

  // dummy — not actually used, just type annotation clarity
  async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256",
      new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b =>
      b.toString(16).padStart(2, "0")).join("");
  }
</script>
</body>
</html>
